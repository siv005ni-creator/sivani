<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>product card</title>
    <style>
        .card{
            border: 2px solid rgb(29, 99, 175);
            border-radius: 10px;
            padding: 20px;
            margin: 20px;
            width: 50%;
            height: 500px;
            text-align: center;
        }
        .card img{
            max-width: 100%;
            min-height: 200px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="card">
<img src="https://www.apple.com/v/macbook-pro/ax/images/meta/macbook-pro__difvbgz1plsi_og.png?202605072050" alt="Macbook">
        <h2>Macbook</h2>
        <p>Awesome spec and greatest feature available in the market. It is a great choice for professionals and students alike.Newest model with latest features.</p>
        </div>
    
</body>
</html>
